name: Release

on:
  push:
    tags:
      - 'v*'           # např. v0.1.0, v1.2.3
  workflow_dispatch:
    inputs:
      version:
        description: 'Verze (např. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write       # nutné pro vytvoření GitHub Release

jobs:
  build:
    name: Build, sign & release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version || github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $ver"

      # ------------------------------------------------------------------
      # Generování ICO z PNG na Windows (zaručeně kompatibilní formát)
      # ------------------------------------------------------------------
      - name: Generate gastrox.ico from PNG
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $src = [System.Drawing.Image]::FromFile("$PWD\grafika\ikona.png")
          $sizes = @(16, 24, 32, 48, 64, 128, 256)
          $ms = New-Object System.IO.MemoryStream

          # ICO header
          $bw = New-Object System.IO.BinaryWriter($ms)
          $bw.Write([uint16]0)       # reserved
          $bw.Write([uint16]1)       # type: ICO
          $bw.Write([uint16]$sizes.Count)

          # Vygenerovat každou velikost jako PNG data
          $pngDataList = @()
          foreach ($sz in $sizes) {
              $bmp = New-Object System.Drawing.Bitmap($src, $sz, $sz)
              $pngMs = New-Object System.IO.MemoryStream
              $bmp.Save($pngMs, [System.Drawing.Imaging.ImageFormat]::Png)
              $pngDataList += ,$pngMs.ToArray()
              $pngMs.Dispose()
              $bmp.Dispose()
          }

          # Directory entries (po headeru, před daty)
          $dataOffset = 6 + ($sizes.Count * 16)  # header=6, entry=16 bytes each
          for ($i = 0; $i -lt $sizes.Count; $i++) {
              $sz = $sizes[$i]
              $pngBytes = $pngDataList[$i]
              $bw.Write([byte]$(if ($sz -ge 256) { 0 } else { $sz }))  # width
              $bw.Write([byte]$(if ($sz -ge 256) { 0 } else { $sz }))  # height
              $bw.Write([byte]0)       # color palette
              $bw.Write([byte]0)       # reserved
              $bw.Write([uint16]1)     # color planes
              $bw.Write([uint16]32)    # bits per pixel
              $bw.Write([uint32]$pngBytes.Length)  # data size
              $bw.Write([uint32]$dataOffset)       # data offset
              $dataOffset += $pngBytes.Length
          }

          # PNG data
          foreach ($pngBytes in $pngDataList) {
              $bw.Write($pngBytes)
          }

          # Uložit
          $icoPath = "$PWD\Gastrox\gastrox.ico"
          [System.IO.File]::WriteAllBytes($icoPath, $ms.ToArray())
          Copy-Item $icoPath "$PWD\installer\gastrox.ico"
          $bw.Dispose()
          $ms.Dispose()
          $src.Dispose()
          Write-Host "ICO generated: $icoPath ($((Get-Item $icoPath).Length) bytes, $($sizes.Count) sizes)"

      - name: Set version in .csproj
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          (Get-Content "Gastrox\Gastrox.csproj") `
            -replace '<Version>.*?</Version>', "<Version>$ver</Version>" |
            Set-Content "Gastrox\Gastrox.csproj"

      - name: Restore
        run: dotnet restore Gastrox.sln

      - name: Publish (folder, self-contained)
        run: >
          dotnet publish Gastrox/Gastrox.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=false
          -p:DebugType=none
          -p:DebugSymbols=false
          -o publish

      # ------------------------------------------------------------------
      # Code signing přes Azure Trusted Signing
      # ------------------------------------------------------------------
      - name: Sign Gastrox.exe with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files: |
            ${{ github.workspace }}/publish/Gastrox.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ------------------------------------------------------------------
      # Inno Setup installer
      # ------------------------------------------------------------------
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          iscc /DMyAppVersion=$ver installer\gastrox.iss
          Write-Host "Installer built: installer\Output\Gastrox-$ver-setup.exe"

      - name: Sign installer with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files: |
            ${{ github.workspace }}/installer/Output/Gastrox-${{ steps.version.outputs.VERSION }}-setup.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ------------------------------------------------------------------
      # Packaging (ZIP + installer)
      # ------------------------------------------------------------------
      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath "Gastrox-${{ steps.version.outputs.VERSION }}-win-x64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gastrox-${{ steps.version.outputs.VERSION }}
          path: |
            Gastrox-${{ steps.version.outputs.VERSION }}-win-x64.zip
            installer/Output/Gastrox-${{ steps.version.outputs.VERSION }}-setup.exe
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Gastrox ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            Gastrox-${{ steps.version.outputs.VERSION }}-win-x64.zip
            installer/Output/Gastrox-${{ steps.version.outputs.VERSION }}-setup.exe
